name: Generate Datas

on:
  schedule: # Executa automaticamente a cada 24 horas
    - cron: "0 0 * * *"
  workflow_dispatch: # Permite que você execute manualmente quando quiser

jobs:
  build:
    name: Jobs to update datas
    runs-on: ubuntu-latest
    steps:
      # Gera o jogo da cobrinha a partir do seu gráfico de contribuições
      - name: generate-github-contribution-grid-snake
        uses: Platane/snk@v3
        with:
          github_user_name: mariajuliafigueiredo
          outputs: |
            dist/github-contribution-grid-snake.svg
            dist/github-contribution-grid-snake-dark.svg?palette=github-dark
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # Pushes os arquivos gerados para a branch 'output'
      - name: push github-contribution-grid-snake to the output branch
        uses: crazy-max/ghaction-github-pages@v3.1.0
        with:
          target_branch: output
          build_dir: dist
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
